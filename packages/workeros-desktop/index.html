<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkerOS Desktop</title>
    <!--
      No-flash theme resolution. The desktop is theme-aware; resolve the effective
      theme before first paint so there's no light/dark flash. The desktop's own
      theme engine (os/theme.js) takes over after mount.
    -->
    <script>
      try {
        var mode = localStorage.getItem("theme") || "system";
        var dark =
          mode === "dark" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <!--
      The WorkerOS service worker (ADR-021): injects COOP/COEP so SharedArrayBuffer
      works (ADR-010) under `otfw dev` and any static host, and routes preview
      requests (/__preview__/<port>/…) into the kernel. This is what makes boot()
      succeed locally without edge headers.
    -->
    <script src="/preview-sw.js"></script>
    <link rel="stylesheet" href="/app/global.css" />
  </head>
  <body>
    <!-- The OTF Web toolchain mounts the app here and injects the bundle. -->
    <div id="app"></div>
  </body>
</html>
