[package]
name = "workeros-web-wasm"
description = "wasm-bindgen bindings that expose the WorkerOS kernel to the browser host runtime."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
workeros-kernel = { path = "../../../crates/workeros-kernel" }
wasm-bindgen = "0.2"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
