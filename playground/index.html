<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkerOS Playground — Desktop</title>
    <!-- No-flash theme resolution before first paint; the desktop's theme engine
         (os/theme.js) takes over after mount. -->
    <script>
      try {
        var mode = localStorage.getItem("theme") || "system";
        var dark =
          mode === "dark" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <!-- The WorkerOS service worker: injects COOP/COEP so SharedArrayBuffer works
         (ADR-010) under `otfw dev`, and routes preview requests into the kernel
         (ADR-021). Without it, boot() throws for lack of cross-origin isolation. -->
    <script src="/preview-sw.js"></script>
    <!-- The desktop's design system. app/global.css is a symlink to the
         @opentf/workeros-desktop package's stylesheet (served by otfw at /app/). -->
    <link rel="stylesheet" href="/app/global.css" />
  </head>
  <body>
    <!-- The OTF Web toolchain mounts the app here and injects the bundle. -->
    <div id="app"></div>
  </body>
</html>
