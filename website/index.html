<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WorkerOS — an operating system that boots in a Web Worker. A real kernel running real processes, with JS and WASM as the native executable format. POSIX-style coreutils and bash-like scripting. Try the live playground."
    />
    <title>WorkerOS — an OS that boots in a Web Worker</title>
    <!--
      The single WorkerOS service worker (ADR-021). Two jobs in one SW (a page has
      one controlling worker): (1) inject COOP/COEP headers so SharedArrayBuffer
      works (ADR-010) on `otfw dev` and any static host; (2) intercept preview
      requests (/__preview__/<port>/…) and route them into the kernel. Supersedes
      the standalone coi-serviceworker.
    -->
    <script src="/preview-sw.js"></script>
    <link rel="stylesheet" href="/app/global.css" />
  </head>
  <body>
    <!-- The OTF Web toolchain mounts the app here and injects the bundle. -->
    <div id="app"></div>
  </body>
</html>
