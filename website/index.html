<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WorkerOS — an operating system that boots in a Web Worker. A real kernel running real processes, with JS and WASM as the native executable format. POSIX-style coreutils and bash-like scripting. Try the live playground."
    />
    <title>WorkerOS — an OS that boots in a Web Worker</title>
    <!--
      No-flash theme resolution. The whole site (landing + docs) is theme-aware and
      driven by the @opentf/web-docs ThemeToggle, which persists a mode to
      localStorage("theme") = "light" | "dark" | "system" (default "system") and sets
      data-theme on <html>. Resolve the effective theme here, before first paint, so
      there's no light/dark flash and the toggle's onMount finds a matching attribute.
    -->
    <script>
      try {
        var mode = localStorage.getItem("theme") || "system";
        var dark =
          mode === "dark" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <!--
      The single WorkerOS service worker (ADR-021). Two jobs in one SW (a page has
      one controlling worker): (1) inject COOP/COEP headers so SharedArrayBuffer
      works (ADR-010) on `otfw dev` and any static host; (2) intercept preview
      requests (/__preview__/<port>/…) and route them into the kernel. Supersedes
      the standalone coi-serviceworker.
    -->
    <script src="/preview-sw.js"></script>
    <link rel="stylesheet" href="/app/global.css" />
  </head>
  <body>
    <!-- The OTF Web toolchain mounts the app here and injects the bundle. -->
    <div id="app"></div>
  </body>
</html>
